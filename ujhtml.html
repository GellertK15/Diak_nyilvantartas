<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Új diák</title>
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand" href="index.html">Diáknyilvántartó</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
          aria-controls="menu"
          aria-expanded="false"
          aria-label="Navigáció váltása"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Kezdőlap</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="lista.html">Diákok listája</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active fw-semibold" href="ujhtml.html"
                >Új diák</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="modositas.html">Módosítás</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="display-5 fw-normal mb-1">Új diák felvétele</h1>
      <p class="text-secondary mb-4">
        1. feladat: reszponzív űrlap + DEMO mentés (adatbázis nélkül)
      </p>

      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="p-2">
            <div class="mb-3">
              <label class="form-label">Név</label>
              <input
                type="text"
                class="form-control"
                placeholder="Pl. Kovács Anna"
              />
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Születési év</label>
                <input
                  type="number"
                  class="form-control"
                  placeholder="Pl. 2007"
                />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Osztály</label>
                <select class="form-select">
                  <option selected disabled>Válasszon osztályt...</option>
                  <option>9A</option>
                  <option>10A</option>
                  <option>11A</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Település</label>
              <select class="form-select">
                <option selected disabled>Válasszon települést...</option>
                <option>Budapest</option>
                <option>Debrecen</option>
                <option>Pécs</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Fénykép linkje</label>
              <input
                type="text"
                class="form-control"
                placeholder="kepek/1.jpg vagy https://..."
              />
            </div>

            <button class="btn btn-primary w-100">Mentés</button>
          </div>
        </div>
      </div>

      <div class="alert alert-info mt-4" role="alert">
        <strong>Megjegyzés:</strong> A mentés itt DEMO jellegű (1. feladat),
        adatbázis-művelet nincs.
      </div>
    </main>

    <script src="./bootstrap/js/bootstrap.min.js"></script>
  </body>
</html>
