<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diáknyilvántartó rendszer</title>
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="hero d-flex align-items-center">
      <div class="container">
        <div class="hero-panel text-white p-4">
          <h1 class="fw-bold mb-1">Diáknyilvántartó rendszer</h1>
          <p class="mb-4">
            Reszponzív weboldal <em>(offline Bootstrap, saját CSS)</em>
          </p>

          <a href="lista.html" class="btn btn-light me-2 mb-2"
            >Diákok listája</a
          >
          <a href="ujhtml.html" class="btn btn-outline-light mb-2"
            >Új diák felvétele</a
          >
        </div>
      </div>
    </header>

    <main class="container py-5">
      <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card section-card h-100">
            <div class="card-body">
              <h2 class="card-title h3">Lista</h2>
              <p class="card-text text-secondary">
                A diákok listájának táblázatos megjelenítése.
              </p>
              <a href="lista.html" class="btn btn-primary">Megnyitás</a>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <div class="card section-card h-100">
            <div class="card-body">
              <h2 class="card-title h3">Új diák</h2>
              <p class="card-text text-secondary">
                Reszponzív űrlap (DEMO mentés).
              </p>
              <a href="ujhtml.html" class="btn btn-primary">Megnyitás</a>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <div class="card section-card h-100">
            <div class="card-body">
              <h2 class="card-title h3">Módosítás</h2>
              <p class="card-text text-secondary">
                Reszponzív osztály-módosítás felület (DEMO).
              </p>
              <a href="modositas.html" class="btn btn-primary">Megnyitás</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="./bootstrap/js/bootstrap.min.js"></script>
  </body>
</html>
